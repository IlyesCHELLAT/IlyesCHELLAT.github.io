<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ilyes | Cyber Security</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #05080f;
  color: #e0f7ff;
}

/* Layout */
.container {
  display: grid;
  grid-template-columns: 250px 1fr;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  background: #070d18;
  padding: 20px;
  border-right: 1px solid rgba(0,255,255,0.1);
}

.profile {
  text-align: center;
}

.profile img {
  width: 100px;
  border-radius: 50%;
  box-shadow: 0 0 20px #00f5ff;
}

.profile h2 {
  margin-top: 10px;
  color: #00f5ff;
}

/* Menu */
.menu {
  margin-top: 30px;
}

.menu div {
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.menu div:hover {
  background: rgba(0,255,255,0.1);
}

/* Main */
.main {
  padding: 30px;
}

/* Section */
.section {
  margin-bottom: 30px;
}

.section h1 {
  color: #00ff9f;
  text-shadow: 0 0 10px #00ff9f;
}

/* Skills */
.skill {
  margin-top: 10px;
}

.bar {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}

.bar div {
  height: 100%;
  background: linear-gradient(90deg,#00f5ff,#00ff9f);
  box-shadow: 0 0 10px #00f5ff;
}

/* Projects */
.project {
  padding: 15px;
  margin-top: 10px;
  background: rgba(0,255,255,0.05);
  border-radius: 10px;
}

.project:hover {
  background: rgba(0,255,255,0.15);
}

/* Top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

</style>

</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="profile">
      <img src="profile.png">
      <h2>Ilyes</h2>
      <p>Cyber Security</p>
    </div>

    <div class="menu">
      <div>Dashboard</div>
      <div>Skills</div>
      <div>Projects</div>
      <div>Contact</div>
    </div>

  </div>

  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <h2>Cyber Dashboard</h2>
      <span>Online</span>
    </div>

    <!-- About -->
    <div class="section">
      <h1>About</h1>
      <p>Focused on cybersecurity, threat detection and network monitoring.</p>
    </div>

    <!-- Skills -->
    <div class="section">
      <h1>Skills</h1>

      <div class="skill">
        Arabic
        <div class="bar"><div style="width:100%"></div></div>
      </div>

      <div class="skill">
        English
        <div class="bar"><div style="width:85%"></div></div>
      </div>

      <div class="skill">
        French
        <div class="bar"><div style="width:70%"></div></div>
      </div>

      <div class="skill">
        Python
        <div class="bar"><div style="width:75%"></div></div>
      </div>

    </div>

    <!-- Projects -->
    <div class="section">
      <h1>Projects</h1>

      <div class="project">
        SIEM Dashboard - monitoring system
      </div>

      <div class="project">
        Network Scanner - Python tool
      </div>

    </div>

  </div>

</div>

</body>
</html>
